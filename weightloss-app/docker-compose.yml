services:
  app:
    # Replace 'yourdockerhubuser' with your actual Docker Hub username
    image: yourdockerhubuser/weightloss-app:latest
    container_name: weightloss-app
    restart: unless-stopped
    ports:
      - "7673:7673"
    environment:
      NODE_ENV: production
      PORT: 7673
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_NAME: weightloss_session
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-720}
      MAX_PHOTO_SIZE_MB: ${MAX_PHOTO_SIZE_MB:-10}
      MAX_PHOTO_STORAGE_MB: ${MAX_PHOTO_STORAGE_MB:-500}
      MAX_PHOTOS_PER_DAY: ${MAX_PHOTOS_PER_DAY:-50}
      LOGIN_RATE_LIMIT_PER_HOUR: ${LOGIN_RATE_LIMIT_PER_HOUR:-10}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:7673}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
      INVITE_ONLY: ${INVITE_ONLY:-true}
      UPLOADS_DIR: /app/uploads
      LOG_DIR: /app/logs
      DATA_DIR: /app/data
      TZ: ${TZ:-UTC}
